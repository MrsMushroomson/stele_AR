<!doctype html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <title>A-Frame: Image Targets Example</title>
  <script crossorigin="anonymous" src="./external/scripts/8frame-1.5.0.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/landing-page.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/xrextras@1/dist/xrextras.js" crossorigin="anonymous"></script>
</head>
<body>
  <script src="bundle.js"></script>
  <a-scene xrextras-gesture-detector landing-page xrextras-loading xrextras-runtime-error
    renderer="colorManagement:true" xrweb="disableWorldTracking: true">

    <a-assets>
      <!-- Outline texture for the target -->
      <img id="outline" src="assets/oultine_stele_latoA.png" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 4 10" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <a-light type="directional" intensity="0.5" position="1 1 1"></a-light>

    <a-light type="ambient" intensity="1"></a-light>

    <!-- Note: "name" must match the image target name in stele_latoA.json -->
    <xrextras-named-image-target name="stele_latoA">
      <a-entity geometry="primitive: plane; height: 0.8; width: 0.6"
        material="src: #outline; transparent: true; opacity: 1"
        position="-0.01 0.20 0.01"
        scale="0.9 0.7  0.9"></a-entity>
    </xrextras-named-image-target>

  </a-scene>

</body>

</html>
